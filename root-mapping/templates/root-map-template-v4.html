<!--
  ROOT MAP TEMPLATE v4.0
  Interactive Root Map with inline editing, change log, snapshot export, drag, undo/redo.
  Sub-feature support, indicators, bizIndicators, star badges, accessibility.
  
  CHANGES FROM v1.0:
  - RY spacing: [50, 530, 1020] — more breathing room between root→categories, tighter categories→features
  - Need cards: solid border (not dashed)
  - Detail panel: white background
  - Zoom: much gentler scroll (±2% per tick), buttons ±8%
  - Default zoom: .24, gentler initial view
  - Expansion opportunity support: optional purple treatment for suggested/speculative nodes
  
  TO USE: Replace the DATA SECTION below (lines marked ===DATA===) with product-specific content.
  Do NOT modify CSS, layout engine, rendering logic, or detail panel structure.
  
  DATA STRUCTURES:
  
  Categories array O[] — each category outcome:
  {
    id: 'c-xxx',                    // unique id prefixed c-
    evs: true|false,                // essential value scope
    diff: 'diff'|'ts'|'bg'|'unc'|'beh',  // competitive position (optional)
    conf: 'high'|'medium'|'low',    // outcome confidence
    label: 'Outcome statement',     // the customer benefit — concrete, testable, direct
    sub: 'Supporting detail',       // clarifying subtitle
    need: 'Customer problem',       // the pain point this addresses
    needSev: 3|2|1,                 // need severity: 3=severe, 2=moderate, 1=minor
    star: true,                     // optional — key differentiator (where you WIN)
    biz: ['Business outcome 1'],    // business outcomes (optional array)
    bizIndicators: ['metric'],      // optional — how you'd measure business outcomes
    sol: [{                         // solutions (optional array)
      name: 'Solution name',
      tech: 'Technical requirements',
      eff: 'strong'|'adequate'|'unproven'
    }],
    indicators: ['metric'],         // optional — how you'd measure this outcome
    detail: {                       // click-through detail (optional but recommended)
      confReason: 'Why this confidence...<sup class="fn" title="Source">1</sup>',
      sources: ['1. Source description'],
      belief: 'Team belief statement',
      competitors: [{n:'Name', d:'Description'}],
      notes: 'Strategic notes'
    }
  }
  
  Features array F[] — each feature outcome:
  {
    id: 'f-xxx',                    // unique id prefixed f-
    parent: 'c-xxx',                // parent category id
    idx: 0,                         // index within parent (0-based, for positioning)
    ... same fields as categories
  }
  
  EXPANSION OPPORTUNITY NODES (optional — add ONLY when user requests):
  
  Expansion nodes use the same schema as regular nodes PLUS:
  {
    id: 'e-xxx',                    // unique id prefixed e-
    isExp: true,                    // marks as expansion opportunity
    leverage: 'high'|'medium',      // strategic leverage level
    ... same fields as categories/features
  }
  
  Category-level expansions: add to catOrd and catCh as peer categories
  Feature-level expansions: add to F[] with parent and idx, positioned rightmost in their zone
  
  POSITIONING RULES FOR EXPANSION NODES:
  - Expansion nodes live at the SAME tier as the thing they're comparable to
  - A new outcome branch (peer to existing categories) → category tier, rightmost in catOrd near its related branch
  - A new feature within an existing branch → feature tier, rightmost idx in parent's children
  - NEVER put expansions in a separate tier — they must be at the correct conceptual altitude
  
  Root object — first item in O[]:
  { id:'root', root:true, ... same fields plus root:true flag }
  
  IMPORTANT:
  - catCh maps category ids to their feature child ids (for zone sizing)
  - catOrd is the left-to-right order of categories
  - Root is centered above the most important/widest category
  - The root's solution should be the product name itself
  - Attach solutions to categories only when a category-level feature suite exists
  - Only attach solutions to features when specific implementations exist
  - Use placeholders: { label:'? Needs articulation', conf:'low', need:'?', needSev:1 }
-->

/* ============================================================
   EDIT MODE — panel-based editing, change log, auto-save
   ============================================================ */
.ws-active .ng{cursor:pointer}
.ws-active .ng:hover{box-shadow:0 8px 28px rgba(0,0,0,.1),0 0 0 2px var(--b200)}
.ws-btn{height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--tx);cursor:pointer;font-size:11px;font-weight:500;padding:0 10px;display:flex;align-items:center;gap:5px;font-family:var(--fn);white-space:nowrap;width:auto}

.ws-tools{display:flex;align-items:center;gap:6px}

.ws-f{width:100%;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-family:var(--fn);font-size:13px;color:var(--tx);background:var(--bg);line-height:1.45;letter-spacing:-.01em;resize:none;overflow:hidden}

<body class="ws-active">
<!-- TOOLBAR -->
<div id="bar"><div><h1>PRODUCT_NAME — Root Map</h1><div class="sub">Inferred product decision logic</div></div><div class="sep"></div><div class="leg"><div class="li"><svg width="9" height="9"><circle cx="4.5" cy="4.5" r="3.5" fill="none" stroke="var(--r200)" stroke-width="1"/></svg>Need</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--b50)" stroke="var(--b400)" stroke-width="1.5"/></svg>Outcome</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--a50)" stroke="var(--a200)" stroke-width="1"/></svg>Business</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--t50)" stroke="var(--t200)" stroke-width="1"/></svg>Solution</div><div class="sep" style="height:14px"></div><div class="li">★ Key differentiator</div></div><div class="zc"><div class="ws-tools"><button class="ws-btn ws-btn-icon" onclick="wsUndo()" id="ws-undo-btn" style="opacity:.35;pointer-events:none" title="Undo (⌘Z)" aria-label="Undo">↩</button><button class="ws-btn ws-btn-icon" onclick="wsRedo()" id="ws-redo-btn" style="opacity:.35;pointer-events:none" title="Redo (⌘⇧Z)" aria-label="Redo">↪</button><div class="sep" style="height:16px"></div><button class="ws-btn" onclick="wsShowLog()" id="ws-log-btn">Changes<span class="ws-badge" id="ws-badge">0</span></button><button class="ws-btn" onclick="wsSaveSnapshot()">Save snapshot</button><button class="ws-btn" onclick="wsCopyData()" id="ws-copy-btn">Copy map data</button><span class="ws-save-ind" id="ws-save-ind"></span></div><div class="sep" style="height:20px"></div><button onclick="zi()" aria-label="Zoom in">+</button><button onclick="zo()" aria-label="Zoom out">−</button><button onclick="rv()" aria-label="Reset view" title="Fit to screen">⊞</button></div></div>
<div id="ws-restore"><span>Edit session found — restore previous edits?</span><button class="ws-r-yes" onclick="wsRestore()">Restore</button><button class="ws-r-no" onclick="wsDismiss()">Start fresh</button></div>

<script>
/* Capture clean HTML source before rendering for snapshot export */
const _SRC='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
/* ============================================================
   LAYOUT ENGINE v4.0 — DO NOT MODIFY
   Zone-based positioning, rendering, arrows, detail panel
   ============================================================ */
const NW=230,NG=35,RY=[50,620,1040];
const CC={high:'var(--hi)',medium:'var(--mi)',low:'var(--lo)'};
const LC={high:'var(--hi)',medium:'var(--mi)'};
const dC={diff:'dd',ts:'dts',bg:'dbg',unc:'du',beh:'dbh'};
const dL={diff:'★ differentiated',ts:'✓ table stakes',bg:'⊕ battleground',unc:'◆ uncontested',beh:'↓ behind'};

/* ============================================================
   ===DATA=== REPLACE EVERYTHING BELOW THIS LINE PER PRODUCT
   ============================================================ */

const catCh = {
  'c-example': ['f-ex1', 'f-ex2'],
};

// Category display order: EVS by shipping sequence (foundational → dependent), then non-EVS, then expansion
const catOrd = ['c-example'];

const O = [
  // ROOT — always first, always root:true
  {id:'root', root:true, evs:true, conf:'high',
    label:'Root outcome goes here',
    sub:'The top-level customer outcome — what will be true if this product succeeds?',
    need:'The core customer problem this product addresses',
    needSev:3,
    biz:['Primary business outcome'],
    sol:[{name:'PRODUCT_NAME', tech:'The product itself is the root-level solution', eff:'strong'}],
    detail:{confReason:'Why the team believes this is the right root outcome.<sup class="fn" title="Source">1</sup>',
      sources:['1. Primary source or research'],
      belief:'The team\'s core conviction about why this matters.',
      competitors:[{n:'Competitor A',d:'How they address the same space'},{n:'Competitor B',d:'Different approach to the same problem'}],
      notes:'PLACEHOLDER — replace with actual product root outcome'}},

  // CATEGORY — one per major outcome branch
  {id:'c-example', evs:true, diff:'bg', conf:'medium',
    label:'Category outcome statement',
    sub:'What must be true within this branch for the root to succeed?',
    need:'The specific customer problem this branch addresses',
    needSev:2,
    biz:['Business outcome this branch produces'],
    sol:[{name:'Feature suite or capability',tech:'Key technical approach',eff:'adequate'}],
    detail:{confReason:'Why this confidence level for this branch.',
      sources:['Research or evidence'],
      belief:'Team belief about this branch\'s importance.',
      competitors:[{n:'Alternative',d:'How competitors address this'}],
      notes:'PLACEHOLDER — replace with actual category outcome'}},
];

const F = [
  // FEATURES — child outcomes within categories
  {id:'f-ex1', parent:'c-example', idx:0, evs:true, conf:'medium',
    label:'Feature outcome 1',
    sub:'Specific outcome this feature enables',
    need:'Specific user problem',
    needSev:2,
    sol:[{name:'Solution name',tech:'Technical approach',eff:'adequate'}],
    detail:{confReason:'Evidence for this feature outcome.',
      notes:'PLACEHOLDER — replace with actual feature outcome'}},

  {id:'f-ex2', parent:'c-example', idx:1, evs:true, conf:'low',
    label:'Feature outcome 2 — needs articulation',
    sub:'What will be true for users?',
    need:'What problem does this solve?',
    needSev:1,
    detail:{notes:'PLACEHOLDER — needs team input to articulate this outcome'}},
];


/* ============================================================
   ===END DATA=== DO NOT MODIFY BELOW THIS LINE
   ============================================================ */

// Zone computation
const zones={};let xC=40;
catOrd.forEach(c=>{const n=catCh[c].length;const zw=Math.max(NW+12,n*(NW+NG)-NG+12);zones[c]={x:xC,w:zw,cx:xC+zw/2,ch:catCh[c]};xC+=zw+NG+40;});
let TW=xC+40;
const userNotes={};

// Position root centered above ALL categories
const firstZ=zones[catOrd[0]], lastZ=zones[catOrd[catOrd.length-1]];
const allCatMidX=(firstZ.x+lastZ.x+lastZ.w)/2;
if(!O[0].x){O[0].x=allCatMidX-140;O[0].y=RY[0];O[0].w=280;}

// Position categories
O.forEach(o=>{if(o.root)return;if(!o.x&&zones[o.id]){o.x=zones[o.id].cx-NW/2;o.y=RY[1];o.w=NW;}});

// Position features within zones
F.forEach(f=>{const z=zones[f.parent];if(!z)return;const n=z.ch.length;const tw=n*NW+(n-1)*NG;const sx=z.x+(z.w-tw)/2;f.x=sx+f.idx*(NW+NG);f.y=RY[2];f.w=NW;});

// Detect and position sub-features
const subCh={};
F.forEach(f=>{if(f.parent&&!catCh[f.parent]){subCh[f.parent]=subCh[f.parent]||[];if(!subCh[f.parent].includes(f.id))subCh[f.parent].push(f.id);}});
F.forEach(f=>{if(!f.parent||catCh[f.parent])return;
  const pn=[...O,...F].find(n=>n.id===f.parent);if(!pn||!pn.x)return;
  const sibs=subCh[f.parent]||[];const n=sibs.length;const tw=n*NW+(n-1)*NG;
  const sx=pn.x+(pn.w||NW)/2-tw/2;const idx=sibs.indexOf(f.id);
  f.x=sx+idx*(NW+NG);f.y=(pn.y||RY[2])+420;f.w=NW;});

// Recompute layout — call after adding/removing nodes to reflow positions
function recomputeLayout(){
  let x=40;
  catOrd.forEach(c=>{
    const ch=catCh[c]||[];const n=ch.length;
    const zw=Math.max(NW+12,n*(NW+NG)-NG+12);
    zones[c]={x:x,w:zw,cx:x+zw/2,ch:ch};
    // Reposition category node
    const cat=allN.find(nd=>nd.id===c);
    if(cat){cat.x=x+zw/2-NW/2;cat.w=NW;if(nodeEls[c])nodeEls[c].el.style.left=cat.x+'px';}
    // Reposition features within zone
    const tw2=n*NW+(n-1)*NG;const sx=x+(zw-tw2)/2;
    ch.forEach((fid,i)=>{
      const feat=allN.find(nd=>nd.id===fid);
      if(feat){feat.x=sx+i*(NW+NG);feat.idx=i;feat.w=NW;if(nodeEls[fid])nodeEls[fid].el.style.left=feat.x+'px';}
    });
    x+=zw+NG+40;
  });
  TW=x+40;
  // Re-center root
  const fz=zones[catOrd[0]],lz=zones[catOrd[catOrd.length-1]];
  if(fz&&lz){const mid=(fz.x+lz.x+lz.w)/2;O[0].x=mid-140;if(nodeEls['root'])nodeEls['root'].el.style.left=O[0].x+'px';}
  // Expand canvas
  cv.style.width=Math.max(parseInt(cv.style.width)||0,TW)+'px';
  svg.setAttribute('width',Math.max(parseInt(svg.getAttribute('width'))||0,TW));
  drawE();
}

const allN=[...O,...F];
const edges=[];catOrd.forEach(c=>{edges.push([c,'root']);catCh[c].forEach(fid=>{edges.push([fid,c]);const sf=subCh[fid];if(sf)sf.forEach(sfid=>edges.push([sfid,fid]));});});
const evsMap={};allN.forEach(n=>{evsMap[n.id]=n.evs});

// Compute bounding box for fit-to-viewport
let bbL=Infinity,bbT=Infinity,bbR=-Infinity,bbB=-Infinity;
allN.forEach(n=>{bbL=Math.min(bbL,n.x);bbT=Math.min(bbT,n.y);bbR=Math.max(bbR,n.x+(n.w||NW));bbB=Math.max(bbB,n.y+400);});// 400 = generous node height estimate
let mapW=bbR-bbL,mapH=bbB-bbT;

// Canvas + SVG
const cv=document.getElementById('cv');cv.style.width=TW+'px';cv.style.height=(RY[2]+900)+'px';
const cvH=RY[2]+900;
const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('class','arrows');svg.setAttribute('width',TW);svg.setAttribute('height',cvH);
svg.innerHTML='<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="a-dim" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
cv.appendChild(svg);

// Unified render for all nodes
const nodeEls={};
const CL={high:3,medium:2,low:1,strong:3,adequate:2,unproven:1};// level to dot count
const SL={3:'strong',2:'moderate',1:'mild'};// need severity labels
function dots(n,max){let d='';for(let i=0;i<n;i++)d+='<span class="d"></span>';return'<div class="ind-dots">'+d+'</div>';}
function sevH(n){n=n||2;let d='';for(let i=0;i<n;i++)d+='<span class="sd"></span>';return'<div class="sev">'+d+' '+(SL[n]||'moderate')+'</div>';}

function nodeHTML(o){
let h='';
if(o.need)h+='<div class="c-need">'+sevH(o.needSev)+o.need+'</div>';
if(o.isExp){
  const levClass=o.leverage==='high'?'lev-hi':'lev-mi';
  const levLabel=o.leverage==='high'?'high leverage':'medium leverage';
  h+='<div class="c-out is-exp'+(o.root?' is-root':'')+'">';
  if(o.leverage)h+=dots(CL[o.leverage]||2);
  h+='<div class="ol"><span>'+o.label+'</span><span class="exp-badge">OPPORTUNITY</span></div>';
  if(o.sub)h+='<div class="os">'+o.sub+'</div>';
  h+='<div class="lev-badge '+levClass+'">'+levLabel+'</div></div>';
} else {
  const et=o.evs?'<span class="evs">EVS</span>':'';
  const starBadge=o.star?'<span class="star-badge">★</span>':'';
  const dt=o.diff?'<div class="dtag '+dC[o.diff]+'">'+dL[o.diff]+'</div>':'';
  h+='<div class="c-out'+(o.root?' is-root':'')+(o.evs===false?' non-evs':'')+'">';
  if(o.conf)h+=dots(CL[o.conf]||2);
  h+='<div class="ol"><span>'+o.label+'</span>'+et+starBadge+'</div>';
  if(o.sub)h+='<div class="os">'+o.sub+'</div>';h+=dt+'</div>';
}
if(o.biz)o.biz.forEach(b=>{h+='<div class="c-biz">'+b+'</div>';});
if(o.sol)o.sol.forEach(s=>{h+='<div class="c-sol">';if(s.eff)h+=dots(CL[s.eff]||1);h+='<div style="padding-right:14px"><div class="sn">'+s.name+'</div><div class="st">'+s.tech+'</div></div></div>';});
// Add-child button: root→category, category→feature, feature→sub-feature
if(o.root){h+='<div class="ng-add" onclick="event.stopPropagation();wsAddCategory()" title="Add outcome branch">+</div>';}
else if(!o.parent&&!o.isExp){h+='<div class="ng-add" onclick="event.stopPropagation();wsAddNode(\''+o.id+'\')" title="Add feature outcome">+</div>';}
else if(o.parent){h+='<div class="ng-add" onclick="event.stopPropagation();wsAddSubFeature(\''+o.id+'\')" title="Add sub-feature">+</div>';}
return h;
}

function attachDrag(g,o){
  let dStartX,dStartY,isDrag=false,oLeft,oTop;
  g.addEventListener('mousedown',function(e){
    if(e.target.closest('.ng-add'))return;// let + button handle itself
    e.stopPropagation();
    isDrag=false;
    dStartX=e.clientX;dStartY=e.clientY;
    oLeft=parseFloat(g.style.left);oTop=parseFloat(g.style.top);
    function onMove(e2){
      const dx=(e2.clientX-dStartX)/s,dy=(e2.clientY-dStartY)/s;
      if(!isDrag&&Math.abs(dx)+Math.abs(dy)<5) return;
      if(!isDrag){isDrag=true;g.classList.add('dragging');}
      g.style.left=(oLeft+dx)+'px';g.style.top=(oTop+dy)+'px';
      drawE();
    }
    function onUp(e2){
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
      if(isDrag){
        g.classList.remove('dragging');
        o.x=parseFloat(g.style.left);o.y=parseFloat(g.style.top);
        drawE();
      } else {
        sp(o);
      }
    }
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  });
}

function renderNode(o){
const g=document.createElement('div');
g.className='ng'+(o.isExp?' is-exp':'');
g.setAttribute('role','button');g.setAttribute('tabindex','0');g.setAttribute('aria-label',o.label);
g.style.left=o.x+'px';g.style.top=o.y+'px';g.style.width=(o.w||NW)+'px';
g.innerHTML=nodeHTML(o);
attachDrag(g,o);
cv.appendChild(g);nodeEls[o.id]={el:g,data:o};
}

function refreshNode(id){
const info=nodeEls[id];if(!info)return;
info.el.innerHTML=nodeHTML(info.data);
// Drag listeners persist on the element — no need to reattach
}

allN.forEach(renderNode);

// Dynamic Y positioning — density-aware gap
requestAnimationFrame(()=>{
  const catCount=catOrd.length;
  const maxFeatPerCat=Math.max(...catOrd.map(c=>(catCh[c]||[]).length),1);
  const totalFeats=F.length;
  // Base gap + extra for density: more horizontal nodes = more vertical room for arrows
  const BASE_GAP=60;
  const rootCatGap=BASE_GAP+Math.max(0,catCount-3)*15;
  const catFeatGap=BASE_GAP+Math.max(0,totalFeats-6)*8;

  const rootEl=nodeEls['root'].el;
  const rootBot=parseFloat(rootEl.style.top)+rootEl.offsetHeight;
  const catY=rootBot+rootCatGap;
  O.forEach(o=>{if(o.root)return;o.y=catY;nodeEls[o.id].el.style.top=catY+'px';});

  // Per-parent gap: features below their parent category
  F.forEach(f=>{
    if(!catCh[f.parent])return;
    const pEl=nodeEls[f.parent]?.el;if(!pEl)return;
    const pBot=parseFloat(pEl.style.top)+pEl.offsetHeight;
    f.y=pBot+catFeatGap;
    nodeEls[f.id].el.style.top=f.y+'px';
  });

  // Sub-features below their parent feature
  F.forEach(f=>{
    if(!f.parent||catCh[f.parent])return;
    const pEl=nodeEls[f.parent]?.el;if(!pEl)return;
    const pBot=parseFloat(pEl.style.top)+pEl.offsetHeight;
    f.y=pBot+catFeatGap;
    nodeEls[f.id].el.style.top=f.y+'px';
    const sibs=subCh[f.parent]||[];const n=sibs.length;const tw=n*NW+(n-1)*NG;
    const pn=allN.find(nd=>nd.id===f.parent);if(!pn)return;
    const sx=pn.x+(pn.w||NW)/2-tw/2;const idx=sibs.indexOf(f.id);
    f.x=sx+idx*(NW+NG);
    nodeEls[f.id].el.style.left=f.x+'px';
  });

  // Recompute bounds and resize canvas
  bbL=Infinity;bbT=Infinity;bbR=-Infinity;bbB=-Infinity;
  allN.forEach(n=>{bbL=Math.min(bbL,n.x);bbT=Math.min(bbT,n.y);bbR=Math.max(bbR,n.x+(n.w||NW));bbB=Math.max(bbB,n.y+(nodeEls[n.id]?.el.offsetHeight||300));});
  mapW=bbR-bbL;mapH=bbB-bbT;
  const newH=bbB+200;
  cv.style.height=newH+'px';svg.setAttribute('height',newH);
  drawE();fitView();ap();
});

// Arrows
function anc(id){const i=nodeEls[id];if(!i)return null;const e=i.el;const x=parseFloat(e.style.left),y=parseFloat(e.style.top);return{cx:x+e.offsetWidth/2,top:y,bot:y+e.offsetHeight};}
function drawE(){
  svg.querySelectorAll('.edge,.flow-pulse').forEach(e=>e.remove());
  edges.forEach(([f,t])=>{
    const a=anc(f),b=anc(t);if(!a||!b)return;
    const src=nodeEls[f]?.data;const isE=src?.isExp;const ne=!isE&&evsMap[f]===false;
    const x1=a.cx,y1=a.top-1,x2=b.cx,y2=b.bot+1;
    const my=(y1+y2)/2;
    const d='M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2;

    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('class','edge');
    if(isE){p.setAttribute('stroke','var(--e400)');p.setAttribute('stroke-width','2');p.setAttribute('stroke-dasharray','10 6');}
    else{p.setAttribute('stroke',ne?'var(--arrd)':'var(--arr)');p.setAttribute('stroke-width',ne?'1.2':'1.8');if(ne)p.setAttribute('stroke-dasharray','8 5');}
    p.setAttribute('marker-end','url(#'+(ne?'a-dim':'a')+')');
    svg.appendChild(p);

    // CSS-animated pulse — GPU-accelerated, zero JS per frame
    if(!isE){

  Object.keys(nodeEls).forEach(id=>refreshNode(id));

}
window.wsUndo=function(){

window.wsRedo=function(){

      const p=allN.find(n=>n.id===cur.parent);
      if(p&&!p.evs){p.evs=true;evsMap[p.id]=true;refreshNode(p.id);}

window.wsRemoveNode=function(nid){

  if(!confirm(msg)) return;

    // Remove all children first
    const kids=(catCh[nid]||[]).slice();

      const kidNode=allN.find(n=>n.id===kid);
      if(kidNode){
        const fi=F.indexOf(kidNode);if(fi>=0)F.splice(fi,1);
        const ai=allN.indexOf(kidNode);if(ai>=0)allN.splice(ai,1);
        if(nodeEls[kid]){nodeEls[kid].el.remove();delete nodeEls[kid];}
      }
    });
    delete catCh[nid];
    const ci=catOrd.indexOf(nid);if(ci>=0)catOrd.splice(ci,1);
    const oi=O.indexOf(node);if(oi>=0)O.splice(oi,1);
  } else {
    // Remove sub-feature children first
    const subKids=F.filter(f=>f.parent===nid).slice();
    subKids.forEach(sk=>{
      const si=F.indexOf(sk);if(si>=0)F.splice(si,1);
      const sa=allN.indexOf(sk);if(sa>=0)allN.splice(sa,1);
      if(nodeEls[sk.id]){nodeEls[sk.id].el.remove();delete nodeEls[sk.id];}
      for(let j=edges.length-1;j>=0;j--){if(edges[j][0]===sk.id||edges[j][1]===sk.id)edges.splice(j,1);}
      delete evsMap[sk.id];
    });
    delete subCh[nid];
    // Clean this node from its parent's subCh if it's a sub-feature itself
    if(subCh[node.parent]){const si=subCh[node.parent].indexOf(nid);if(si>=0)subCh[node.parent].splice(si,1);}
    const fi=F.indexOf(node);if(fi>=0)F.splice(fi,1);
    if(catCh[node.parent]){const idx=catCh[node.parent].indexOf(nid);if(idx>=0)catCh[node.parent].splice(idx,1);}
  }
  const ai=allN.indexOf(node);if(ai>=0)allN.splice(ai,1);
  if(nodeEls[nid]){nodeEls[nid].el.remove();delete nodeEls[nid];}
  // Remove edges
  for(let i=edges.length-1;i>=0;i--){if(edges[i][0]===nid||edges[i][1]===nid)edges.splice(i,1);}
  delete evsMap[nid];
  drawE();hp();autoSave();
};

/* ---- Change log UI ---- */
function updateChangeLogUI(){
  const badge=document.getElementById('ws-badge');const count=changeLog.length;
  badge.textContent=count;badge.classList.toggle('has-changes',count>0);
  const container=document.getElementById('ws-log-entries');
  if(count===0){container.innerHTML='<div class="wl-empty">No changes yet</div>';return;}
  container.innerHTML=changeLog.slice().reverse().map(c=>{
    const fieldName=c.field==='label'?'Outcome':c.field==='sub'?'Subtitle':c.field==='need'?'Need':c.field.startsWith('biz')?'Business outcome':c.field.startsWith('sol')?'Solution':'Field';
    const time=new Date(c.time);const timeStr=time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return'<div class="wl-entry"><div class="wl-field">'+fieldName+' · '+c.nodeLabel+'</div><div class="wl-from">'+escH(c.from)+'</div><div class="wl-to">'+escH(c.to)+'</div><div class="wl-time">'+timeStr+'</div></div>';
  }).join('');
}
function escH(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
window.wsShowLog=function(){document.getElementById('ws-log').classList.add('open');};
window.wsHideLog=function(){document.getElementById('ws-log').classList.remove('open');};

/* ---- Auto-save ---- */
function autoSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    const state={
      data:allN.map(n=>({id:n.id,label:n.label,sub:n.sub,need:n.need,needSev:n.needSev,conf:n.conf,evs:n.evs,biz:n.biz,sol:n.sol?n.sol.map(s=>({name:s.name,tech:s.tech,eff:s.eff})):null})),
      changeLog,sessionNotes:document.getElementById('ws-session-notes')?.value||'',
      lastSaved:new Date().toISOString()
    };
    try{localStorage.setItem(WS_KEY,JSON.stringify(state));}catch(e){}
    document.getElementById('ws-save-ind').textContent='Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  },500);
}
document.getElementById('ws-session-notes')?.addEventListener('input',()=>autoSave());
window.addEventListener('beforeunload',e=>{if(changeLog.length>0){e.preventDefault();e.returnValue='';}});

/* ---- Restore ---- */
function checkRestore(){
  let saved;try{saved=JSON.parse(localStorage.getItem(WS_KEY));}catch(e){return;}
  if(!saved?.data) return;
  const banner=document.getElementById('ws-restore');const date=new Date(saved.lastSaved);
  banner.querySelector('span').textContent='Unsaved changes from '+date.toLocaleDateString()+' '+date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' found. Restore?';
  banner.style.display='flex';
}
window.wsRestore=function(){
  let saved;try{saved=JSON.parse(localStorage.getItem(WS_KEY));}catch(e){return;}
  if(!saved) return;
  saved.data.forEach(sd=>{const node=allN.find(n=>n.id===sd.id);if(!node)return;Object.assign(node,{label:sd.label,sub:sd.sub,need:sd.need,needSev:sd.needSev,conf:sd.conf,evs:sd.evs,biz:sd.biz,sol:sd.sol});});
  if(saved.changeLog) changeLog.push(...saved.changeLog);
  if(saved.sessionNotes){const ta=document.getElementById('ws-session-notes');if(ta)ta.value=saved.sessionNotes;}
  Object.keys(nodeEls).forEach(id=>refreshNode(id));
  updateChangeLogUI();document.getElementById('ws-restore').style.display='none';
};
window.wsDismiss=function(){try{localStorage.removeItem(WS_KEY);}catch(e){}document.getElementById('ws-restore').style.display='none';};

/* ---- Clean node helper ---- */
const cleanProps=['id','parent','idx','root','evs','star','isExp','leverage','diff','conf','label','sub','need','needSev','biz','bizIndicators','sol','indicators','detail'];
function cleanNode(n){const c={};cleanProps.forEach(p=>{if(n[p]!==undefined&&n[p]!==null)c[p]=n[p];});return c;}

/* ---- Copy map data for AI ---- */
window.wsCopyData=function(){
  const oData=allN.filter(n=>!n.parent).map(cleanNode);const fData=allN.filter(n=>n.parent).map(cleanNode);
  let out='// Root Map data — paste this as context for Claude, Cursor, Codex, etc.\n';
  out+='// Product: '+prodName+'\n\n';
  out+='catCh = '+JSON.stringify(catCh,null,2)+';\n\n';
  out+='catOrd = '+JSON.stringify(catOrd)+';\n\n';
  out+='O = '+JSON.stringify(oData,null,2).replace(/"([a-zA-Z_]\w*)":/g,'$1:')+';\n\n';
  out+='F = '+JSON.stringify(fData,null,2).replace(/"([a-zA-Z_]\w*)":/g,'$1:')+';\n';
  navigator.clipboard.writeText(out).then(()=>{
    document.getElementById('ws-save-ind').textContent='Map data copied ✓';
    setTimeout(()=>{document.getElementById('ws-save-ind').textContent='';},2500);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=out;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    document.getElementById('ws-save-ind').textContent='Map data copied ✓';
    setTimeout(()=>{document.getElementById('ws-save-ind').textContent='';},2500);
  });
};

/* ---- Save Snapshot ---- */
window.wsSaveSnapshot=function(){document.getElementById('ws-modal-bg').classList.add('open');document.getElementById('ws-changelog').focus();};
window.wsCloseModal=function(){document.getElementById('ws-modal-bg').classList.remove('open');};
window.wsConfirmSave=function(){
  const changeNote=document.getElementById('ws-changelog').value.trim();
  document.getElementById('ws-modal-bg').classList.remove('open');
  const oData=allN.filter(n=>!n.parent).map(cleanNode);const fData=allN.filter(n=>n.parent).map(cleanNode);
  let dataStr='const catCh = '+JSON.stringify(catCh,null,2)+';\nconst catOrd = '+JSON.stringify(catOrd)+';\n';
  dataStr+='const O = '+JSON.stringify(oData,null,2).replace(/"([a-zA-Z_]\w*)":/g,'$1:')+';\n';
  dataStr+='const F = '+JSON.stringify(fData,null,2).replace(/"([a-zA-Z_]\w*)":/g,'$1:')+';\n';
  const html=_SRC;const si=html.indexOf('===DATA===');const ei=html.indexOf('===END DATA===');
  if(si<0||ei<0){alert('Could not find data markers.');return;}
  const sle=html.indexOf('\n',si);const els=html.lastIndexOf('\n',ei);
  let lc='\n/* Snapshot '+new Date().toISOString()+' */\n';
  if(changeNote) lc+='/* Changelog: '+changeNote.replace(/\*\//g,'* ')+' */\n';
  const sn=document.getElementById('ws-session-notes')?.value;
  if(sn) lc+='/* Session notes: '+sn.replace(/\*\//g,'* /')+' */\n';
  if(changeLog.length>0){lc+='/* Changes:\n';changeLog.forEach(c=>{lc+='   - '+c.field+' on "'+c.nodeLabel.replace(/\*\//g,'* /')+'"\n';});lc+='*/\n';}
  const out=html.substring(0,sle+1)+lc+'\n'+dataStr+'\n'+html.substring(els);
  const blob=new Blob([out],{type:'text/html'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=prodName.replace(/\s+/g,'-').toLowerCase()+'-root-map-'+new Date().toISOString().slice(0,10)+'.html';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  document.getElementById('ws-save-ind').textContent='Snapshot saved ✓';
  setTimeout(()=>{document.getElementById('ws-save-ind').textContent='';},3000);
  document.getElementById('ws-changelog').value='';
  try{localStorage.removeItem(WS_KEY);}catch(e){}
};
checkRestore();
})();
</script>
