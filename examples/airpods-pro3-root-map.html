  ROOT MAP HTML TEMPLATE v2.0
  Visual specification updated from v1.0 (AirPods Pro 3 v10 iteration).
  
  CHANGES FROM v1.0:
  - RY spacing: [50, 530, 1020] — more breathing room between root→categories, tighter categories→features
  - Need cards: solid border (not dashed)
  - Detail panel: white background
  - Zoom: much gentler scroll (±2% per tick), buttons ±8%
  - Default zoom: .24, gentler initial view
  - Expansion opportunity support: optional purple treatment for suggested/speculative nodes
  
  TO USE: Replace the DATA SECTION below (lines marked ===DATA===) with product-specific content.
  Do NOT modify CSS, layout engine, rendering logic, or detail panel structure.
  
  DATA STRUCTURES:
  
  Categories array O[] — each category outcome:
  {
    id: 'c-xxx',                    // unique id prefixed c-
    evs: true|false,                // essential value scope
    diff: 'diff'|'ts'|'bg'|'unc'|'beh',  // competitive position (optional)
    conf: 'high'|'medium'|'low',    // outcome confidence
    label: 'Outcome statement',     // the customer benefit — concrete, testable, direct
    sub: 'Supporting detail',       // clarifying subtitle
    need: 'Customer problem',       // the pain point this addresses
    needSev: 3|2|1,                 // need severity: 3=severe, 2=moderate, 1=minor
    biz: ['Business outcome 1'],    // business outcomes (optional array)
    sol: [{                         // solutions (optional array)
      name: 'Solution name',
      tech: 'Technical requirements',
      eff: 'strong'|'adequate'|'unproven'
    }],
    detail: {                       // click-through detail (optional but recommended)
      confReason: 'Why this confidence...<sup class="fn" title="Source">1</sup>',
      sources: ['1. Source description'],
      belief: 'Team belief statement',
      competitors: [{n:'Name', d:'Description'}],
      notes: 'Strategic notes'
    }
  }
  
  Features array F[] — each feature outcome:
  {
    id: 'f-xxx',                    // unique id prefixed f-
    parent: 'c-xxx',                // parent category id
    idx: 0,                         // index within parent (0-based, for positioning)
    ... same fields as categories
  }
  
  EXPANSION OPPORTUNITY NODES (optional — add ONLY when user requests):
  
  Expansion nodes use the same schema as regular nodes PLUS:
  {
    id: 'e-xxx',                    // unique id prefixed e-
    isExp: true,                    // marks as expansion opportunity
    leverage: 'high'|'medium',      // strategic leverage level
    ... same fields as categories/features
  }
  
  Category-level expansions: add to catOrd and catCh as peer categories
  Feature-level expansions: add to F[] with parent and idx, positioned rightmost in their zone
  
  POSITIONING RULES FOR EXPANSION NODES:
  - Expansion nodes live at the SAME tier as the thing they're comparable to
  - A new outcome branch (peer to existing categories) → category tier, rightmost in catOrd near its related branch
  - A new feature within an existing branch → feature tier, rightmost idx in parent's children
  - NEVER put expansions in a separate tier — they must be at the correct conceptual altitude
  
  Root object — first item in O[]:
  { id:'root', root:true, ... same fields plus root:true flag }
  
  IMPORTANT:
  - catCh maps category ids to their feature child ids (for zone sizing)
  - catOrd is the left-to-right order of categories
  - Root is centered above the most important/widest category
  - The root's solution should be the product name itself
  - Attach solutions to categories only when a category-level feature suite exists
  - Only attach solutions to features when specific implementations exist
  - Use placeholders: { label:'? Needs articulation', conf:'low', need:'?', needSev:1 }
-->

/* ============================================================
   ===END DATA=== DO NOT MODIFY BELOW THIS LINE
   ============================================================ */

// Zone computation
const zones={};let xC=40;
catOrd.forEach(c=>{const n=catCh[c].length;const zw=Math.max(NW+12,n*(NW+NG)-NG+12);zones[c]={x:xC,w:zw,cx:xC+zw/2,ch:catCh[c]};xC+=zw+NG+15;});
const TW=xC+40;
const userNotes={};

// Position root centered above ALL categories
const firstZ=zones[catOrd[0]], lastZ=zones[catOrd[catOrd.length-1]];
const allCatMidX=(firstZ.x+lastZ.x+lastZ.w)/2;
if(!O[0].x){O[0].x=allCatMidX-140;O[0].y=RY[0];O[0].w=280;}

// Position categories
O.forEach(o=>{if(o.root)return;if(!o.x&&zones[o.id]){o.x=zones[o.id].cx-NW/2;o.y=RY[1];o.w=NW;}});

// Position features within zones
F.forEach(f=>{const z=zones[f.parent];if(!z)return;const n=z.ch.length;const tw=n*NW+(n-1)*NG;const sx=z.x+(z.w-tw)/2;f.x=sx+f.idx*(NW+NG);f.y=RY[2];f.w=NW;});

const allN=[...O,...F];
const edges=[];catOrd.forEach(c=>{edges.push([c,'root']);catCh[c].forEach(f=>edges.push([f,c]));});
const evsMap={};allN.forEach(n=>{evsMap[n.id]=n.evs});

// Compute bounding box for fit-to-viewport
let bbL=Infinity,bbT=Infinity,bbR=-Infinity,bbB=-Infinity;
allN.forEach(n=>{bbL=Math.min(bbL,n.x);bbT=Math.min(bbT,n.y);bbR=Math.max(bbR,n.x+(n.w||NW));bbB=Math.max(bbB,n.y+400);});// 400 = generous node height estimate
const mapW=bbR-bbL,mapH=bbB-bbT;

// Canvas + SVG
const cv=document.getElementById('cv');cv.style.width=TW+'px';cv.style.height=(RY[2]+900)+'px';
const cvH=RY[2]+900;
const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');svg.setAttribute('class','arrows');svg.setAttribute('width',TW);svg.setAttribute('height',cvH);
svg.innerHTML='<defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1.5L8 5L2 8.5" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
cv.appendChild(svg);

// Unified render for all nodes
const nodeEls={};
function sevH(n){n=n||2;const c=n>=3?'s3':n>=2?'s2':'s1';const l=n>=3?'severe':n>=2?'moderate':'minor';let d='';for(let i=1;i<=3;i++)d+='<span class="sd'+(i<=n?' on':'')+'">&ZeroWidthSpace;</span>';return'<div class="sev '+c+'">'+d+' '+l+'</div>';}

function renderNode(o){
const g=document.createElement('div');
const isE=o.isExp;
g.className='ng'+(isE?' is-exp':'');
g.style.left=o.x+'px';g.style.top=o.y+'px';g.style.width=(o.w||NW)+'px';
let h='';
if(o.need)h+='<div class="c-need">'+sevH(o.needSev)+o.need+'</div>';
if(isE){
  const levClass=o.leverage==='high'?'lev-hi':'lev-mi';
  const levLabel=o.leverage==='high'?'high leverage':'medium leverage';
  h+='<div class="c-out is-exp'+(o.root?' is-root':'')+'\">';
  if(o.leverage)h+='<div class="cbg" style="background:'+LC[o.leverage]+'\" title="'+o.leverage+' leverage"></div>';
  h+='<div class="ol">'+o.label+'<span class="exp-badge">OPPORTUNITY</span></div>';
  if(o.sub)h+='<div class="os">'+o.sub+'</div>';
  h+='<div class="lev-badge '+levClass+'">'+levLabel+'</div></div>';
} else {
  const et=o.evs?'<span class="evs">EVS</span>':'';
  const starBadge=o.star?'<span class="star-badge">★</span>':'';
  const dt=o.diff?'<div class="dtag '+dC[o.diff]+'">'+dL[o.diff]+'</div>':'';
  h+='<div class="c-out'+(o.root?' is-root':'')+(o.evs===false?' non-evs':'')+'\">';
  if(o.conf)h+='<div class="cbg" style="background:'+CC[o.conf]+'\" title="'+o.conf+' confidence"></div>';
  h+='<div class="ol">'+o.label+et+starBadge+'</div>';
  if(o.sub)h+='<div class="os">'+o.sub+'</div>';h+=dt+'</div>';
}
if(o.biz)o.biz.forEach(b=>{h+='<div class="c-biz">'+b+'</div>';});
if(o.sol)o.sol.forEach(s=>{h+='<div class="c-sol">';if(s.eff)h+='<div class="eff" style="background:'+(s.eff==='strong'?'var(--hi)':s.eff==='adequate'?'var(--mi)':'var(--neu)')+'\" title="'+s.eff+'"></div>';h+='<div style="padding-right:14px"><div class="sn">'+s.name+'</div><div class="st">'+s.tech+'</div></div></div>';});
g.innerHTML=h;g.onclick=e=>{e.stopPropagation();sp(o)};cv.appendChild(g);nodeEls[o.id]={el:g,data:o};
}
allN.forEach(renderNode);

// Arrows
function anc(id){const i=nodeEls[id];if(!i)return null;const e=i.el;const x=parseFloat(e.style.left),y=parseFloat(e.style.top);return{cx:x+e.offsetWidth/2,top:y,bot:y+e.offsetHeight};}
function drawE(){svg.querySelectorAll('.edge').forEach(e=>e.remove());edges.forEach(([f,t])=>{const a=anc(f),b=anc(t);if(!a||!b)return;const src=nodeEls[f]?.data;const isE=src?.isExp;const ne=!isE&&evsMap[f]===false;const x1=a.cx,y1=a.top-1,x2=b.cx,y2=b.bot+1;const p=document.createElementNS('http://www.w3.org/2000/svg','path');const my=(y1+y2)/2;p.setAttribute('d','M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2);p.setAttribute('fill','none');p.setAttribute('class','edge');
if(isE){p.setAttribute('stroke','var(--e400)');p.setAttribute('stroke-width','2');p.setAttribute('stroke-dasharray','10 6');}
else{p.setAttribute('stroke',ne?'var(--arrd)':'var(--arr)');p.setAttribute('stroke-width',ne?'1.2':'1.8');if(ne)p.setAttribute('stroke-dasharray','8 5');}
p.setAttribute('marker-end','url(#a)');svg.appendChild(p);});}
setTimeout(drawE,500);
window.addEventListener('resize',()=>setTimeout(drawE,100));

// Detail panel
let selectedEl=null;
function sp(o){const d=o.detail||{};const p=document.getElementById('dp'),c=document.getElementById('dc');const isE=o.isExp;const conf=o.conf||'medium';const sn=o.needSev||2;const sevLbl=sn>=3?'Severe':sn>=2?'Moderate':'Minor';const sevSub=sn>=3?'Strong motivation to solve':sn>=2?'Real problem, workarounds exist':'Mild inconvenience';
if(selectedEl)selectedEl.classList.remove('selected');const ne=nodeEls[o.id];if(ne){ne.el.classList.add('selected');selectedEl=ne.el;}
let compH='';if(d.competitors?.length){compH='<div class="ds"><div class="ds-label">Competitive landscape</div><table class="comp-table">'+d.competitors.map(c=>'<tr><td class="cn">'+c.n+'</td><td class="cd">'+c.d+'</td></tr>').join('')+'</table></div>';}
let solH='';if(o.sol?.length){solH='<div class="ds"><div class="ds-label">Solutions &amp; effectiveness</div>'+o.sol.map(s=>{const ec=s.eff||'unproven';const ecolor=ec==='strong'?'var(--hi)':ec==='adequate'?'var(--mi)':'var(--neu)';const elbl=ec==='strong'?'Strong — effectively produces outcome':ec==='adequate'?'Adequate — functional, room to improve':'Unproven — not yet validated';return'<div class="dsol"><div class="dsol-name">'+s.name+'</div><div class="dsol-eff"><span class="ind-dot" style="background:'+ecolor+'"></span><span>'+elbl+'</span></div><div class="dsol-tech">'+s.tech+'</div></div>';}).join('')+'</div>';}
let bizH='';if(o.biz?.length){bizH='<div class="ds"><div class="ds-label">Business outcomes</div>'+o.biz.map(b=>'<p style="margin-bottom:6px">'+b+'</p>').join('')+'</div>';}
let srcH='';if(d.sources?.length){srcH='<div class="src-box"><div class="ds-label">Sources</div>'+d.sources.map((s,i)=>'<div class="src-item" data-n="'+(i+1)+'.">'+s+'</div>').join('')+'</div>';}
const en=userNotes[o.id]||'';const tagClass=isE?' is-exp':'';const hClass=isE?' is-exp':'';
const starText=o.star?' · ★ key differentiator':'';
const tagText=isE?'Expansion opportunity'+(o.leverage?' · '+o.leverage+' leverage':''):'Experience outcome'+(o.evs?' · EVS':'')+(o.diff?' · '+dL[o.diff]:'')+starText;
const indLabel1=isE?'Strategic leverage':'Outcome confidence';const indVal1=isE?o.leverage:conf;const indColor1=isE?LC[o.leverage]:CC[conf];
c.innerHTML='<div class="dp-tag'+tagClass+'">'+tagText+'</div><div class="dp-h'+hClass+'">'+o.label+'</div>'+(o.sub?'<div class="dp-sub">'+o.sub+'</div>':'')+'<div class="ind-strip"><div><div class="ind-label">'+indLabel1+'</div><div class="ind-val"><span class="ind-dot" style="background:'+indColor1+'"></span>'+indVal1+'</div></div><div><div class="ind-label">Need severity</div><div class="ind-val"><span class="ind-dot" style="background:'+(sn>=3?'var(--lo)':sn>=2?'var(--mi)':'var(--neu)')+'"></span>'+sevLbl+'</div></div></div>'+(d.confReason?'<div class="ds"><div class="ds-label">'+(isE?'Evidence & rationale':'Why this confidence level?')+'</div><p class="mu">'+d.confReason+'</p></div>':'')+(o.need?'<div class="ds"><div class="ds-label">Problem addressed</div><p>'+o.need+'</p><p class="mu" style="margin-top:6px">'+sevLbl+' — '+sevSub+'</p></div>':'')+(d.belief?'<div class="ds"><div class="ds-label">'+(isE?'Strategic thesis':'Team belief')+'</div><p>'+d.belief+'</p></div>':'')+compH+bizH+solH+srcH+(d.notes?'<div class="'+(isE?'exp-note-box':'note-box')+'">'+d.notes+'</div>':'')+'<div class="user-notes"><div class="ds-label">Your notes &amp; evidence</div><textarea id="un-'+o.id+'" placeholder="'+(isE?'Strategic assessment, risks, dependencies, evidence for or against...':'Add context, links to research, questions for the team, or evidence that supports or challenges this belief...')+'">'+en+'</textarea><div class="sh">Saved for this session · paste links, data, or questions</div></div>';
const ta=c.querySelector('textarea');if(ta)ta.addEventListener('input',function(){userNotes[o.id]=this.value;});
p.classList.add('open');}
function hp(){if(selectedEl){selectedEl.classList.remove('selected');selectedEl=null;}document.getElementById('dp').classList.remove('open')}

// Pan + zoom — fit to viewport on load
const cont=document.getElementById('cc');
const PAD=60;// padding around content
function fitView(){
  const vw=cont.clientWidth,vh=cont.clientHeight;
  const sx=(vw-PAD*2)/mapW,sy=(vh-PAD*2)/mapH;
  s=Math.min(sx,sy,1.5);// don't zoom in past 1.5x
  px=(vw-mapW*s)/2-bbL*s;
  py=(vh-mapH*s)/2-bbT*s;
}
let s,px,py;fitView();
function ap(){cv.style.transform='translate('+px+'px,'+py+'px) scale('+s+')'}ap();
let dr=false,sx,sy;
cont.addEventListener('mousedown',e=>{if(e.target.closest('.ng'))return;dr=true;sx=e.clientX-px;sy=e.clientY-py});window.addEventListener('mousemove',e=>{if(!dr)return;px=e.clientX-sx;py=e.clientY-sy;ap()});window.addEventListener('mouseup',()=>dr=false);cont.addEventListener('wheel',e=>{e.preventDefault();const olds=s;s=Math.max(.05,Math.min(2,s*(e.deltaY>0?.98:1.02)));const r=s/olds;const rect=cont.getBoundingClientRect();const cx=e.clientX-rect.left,cy=e.clientY-rect.top;px=cx-r*(cx-px);py=cy-r*(cy-py);ap()},{passive:false});
function zi(){const olds=s;s=Math.min(2,s*1.08);const r=s/olds;const vw=cont.clientWidth/2,vh=cont.clientHeight/2;px=vw-r*(vw-px);py=vh-r*(vh-py);ap()}
function zo(){const olds=s;s=Math.max(.05,s*.92);const r=s/olds;const vw=cont.clientWidth/2,vh=cont.clientHeight/2;px=vw-r*(vw-px);py=vh-r*(vh-py);ap()}
function rv(){fitView();ap()}
cv.addEventListener('click',e=>{if(!e.target.closest('.ng'))hp()});
// Re-fit on window resize
window.addEventListener('resize',()=>{fitView();ap()});
</script>
