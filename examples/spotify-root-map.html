<style>

*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--tx);font-family:var(--fn);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased}
#bar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:16px}#bar h1{font-family:var(--fnd);font-size:15px;font-weight:600;letter-spacing:-.02em}#bar .sub{color:var(--tl);font-size:11px;margin-top:1px}.sep{width:1px;height:20px;background:var(--bd)}.leg{display:flex;gap:12px;font-size:10px;color:var(--tm);align-items:center;flex-wrap:wrap}.li{display:flex;align-items:center;gap:4px}.zc{margin-left:auto;display:flex;gap:4px}.zc button{width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--tx);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
#cc{position:absolute;top:48px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab}#cc:active{cursor:grabbing}#cv{position:absolute;transform-origin:0 0}
.ng{position:absolute;background:var(--cbg);border:1px solid var(--cbd);border-radius:12px;padding:6px;cursor:pointer;transition:transform .15s,box-shadow .15s}.ng:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.07);z-index:10}
.ng.selected{background:#fff;border-color:var(--bd);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:11}
@media(prefers-color-scheme:dark){.ng.selected{background:#1E1E1C;border-color:var(--bd)}}
.ng.is-exp{background:color-mix(in srgb,var(--e50) 40%,transparent);border:2px dashed var(--e400);border-radius:14px}
.c-need{border-radius:6px;padding:5px 8px;font-size:8px;line-height:1.35;background:var(--r50);border:1px solid var(--r200);color:var(--r800);margin-bottom:4px}.sev{display:flex;align-items:center;gap:2px;margin-bottom:3px;font-size:7px;font-weight:600;color:var(--r600)}.sd{width:4px;height:4px;border-radius:50%;background:var(--r200);opacity:.2;display:inline-block}.sd.on{opacity:1}.s3 .sd.on{background:var(--lo)}.s2 .sd.on{background:var(--mi)}.s1 .sd.on{background:var(--neu)}
.c-out{border-radius:8px;padding:10px 12px 8px;background:var(--b50);border:2px solid var(--b400);position:relative;margin-bottom:4px}.c-out.is-root{border-width:3px;padding:12px 14px 10px}.c-out.non-evs{border-style:dashed;border-color:var(--b200);opacity:.78}.c-out .ol{font-family:var(--fnd);font-size:12px;font-weight:600;color:var(--b800);line-height:1.25;letter-spacing:-.01em;padding-right:20px}.c-out.is-root .ol{font-size:15px}.c-out .os{font-size:9px;color:var(--b600);margin-top:3px;line-height:1.3}

@media(prefers-color-scheme:dark){.star-badge{color:#E8B84A}}
.exp-badge{font-size:6px;font-weight:700;padding:2px 4px;border-radius:3px;background:var(--e400);color:#fff;margin-left:3px;letter-spacing:.04em;vertical-align:2px}
.lev-badge{font-size:7px;font-weight:600;padding:2px 5px;border-radius:3px;display:inline-block;margin-top:3px}.lev-hi{background:#E1F5EE;color:#0A5C43}.lev-mi{background:#FFF3DB;color:#6B4E00}
@media(prefers-color-scheme:dark){.lev-hi{background:#0A3B30;color:#72D4AB}.lev-mi{background:#3D2800;color:#D4940E}}
.dtag{font-size:7px;font-weight:600;padding:2px 5px;border-radius:3px;display:inline-block;margin-top:3px}.dd{background:#E1F5EE;color:#0A5C43}.dts{background:var(--g50);color:var(--tm)}.dbg{background:#FFF3DB;color:#6B4E00}.du{background:#EDE9FE;color:#4E3D9E}.dbh{background:#FEE9E9;color:#7A1D1D}
@media(prefers-color-scheme:dark){.dd{background:#0A3B30;color:#72D4AB}.dts{background:var(--g50);color:var(--tm)}.dbg{background:#3D2800;color:#D4940E}.du{background:#2A2060;color:#B3A4ED}.dbh{background:#401515;color:#F09595}.evs{background:var(--b400)}.exp-badge{background:var(--e400)}}
.cbg{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
.c-biz{border-radius:5px;padding:4px 8px;font-size:8px;line-height:1.3;background:var(--a50);border:1px solid var(--a200);color:var(--a800);margin-bottom:2px}.c-sol{border-radius:5px;padding:4px 8px;font-size:8px;line-height:1.3;background:var(--t50);border:1px solid var(--t200);color:var(--t800);margin-bottom:2px;position:relative}.c-sol .sn{font-weight:600;font-size:9px}.c-sol .st{font-size:7px;opacity:.55;margin-top:1px}.eff{position:absolute;top:4px;right:5px;width:6px;height:6px;border-radius:50%}
#dp{position:fixed;right:-420px;top:48px;bottom:0;width:400px;background:#fff;border-left:1px solid var(--bd);z-index:200;transition:right .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}#dp.open{right:0}.dp-i{padding:32px 28px 48px}.xb{position:sticky;top:0;float:right;margin:12px 12px 0 0;width:28px;height:28px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--tm);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;z-index:10}

.ind-strip{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 0;border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);margin-bottom:24px}.ind-label{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin-bottom:4px}.ind-val{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}.ind-dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.ds{margin-bottom:24px}.ds-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--tl);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}.ds p{font-size:13px;line-height:1.6;color:var(--tx)}.ds .mu{color:var(--tm);font-size:12px;line-height:1.55}
sup.fn{font-size:9px;color:var(--b600);cursor:help;font-weight:600;vertical-align:super;margin-left:1px;border-bottom:1px dotted var(--b200)}
.comp-table{width:100%;border-collapse:collapse;font-size:12px}.comp-table td{padding:8px 0;border-bottom:1px solid var(--bd);vertical-align:top}.comp-table tr:last-child td{border-bottom:none}.comp-table .cn{font-weight:600;width:100px;color:var(--tx);padding-right:12px}.comp-table .cd{color:var(--tm)}
.dsol{padding:12px 0;border-bottom:1px solid var(--bd)}.dsol:last-child{border-bottom:none}.dsol-name{font-size:13px;font-weight:600;color:var(--t800);margin-bottom:4px}.dsol-eff{font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:4px}.dsol-tech{font-size:11px;color:var(--tm);line-height:1.45;padding-left:14px;border-left:2px solid var(--t200)}
.src-box{background:var(--g50);border-radius:8px;padding:14px 16px;margin-top:24px}.src-box .ds-label{border-bottom:none;padding-bottom:0;margin-bottom:6px}.src-item{font-size:11px;color:var(--tm);line-height:1.5;padding:3px 0 3px 20px;position:relative}.src-item::before{content:attr(data-n);position:absolute;left:0;font-size:9px;font-weight:600;color:var(--b600)}
.note-box{background:var(--a50);border-left:3px solid var(--a200);border-radius:0 8px 8px 0;padding:14px 16px;margin-top:20px;font-size:12px;line-height:1.55;color:var(--a800)}
.exp-note-box{background:var(--e50);border-left:3px solid var(--e400);border-radius:0 8px 8px 0;padding:14px 16px;margin-top:20px;font-size:12px;line-height:1.55;color:var(--e800)}
.user-notes{margin-top:28px;border-top:1px solid var(--bd);padding-top:20px}.user-notes textarea{width:100%;min-height:80px;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-family:var(--fn);font-size:12px;color:var(--tx);background:var(--bg);resize:vertical;line-height:1.5}.user-notes textarea:focus{outline:none;border-color:var(--b400)}.user-notes textarea::placeholder{color:var(--tl)}.user-notes .sh{font-size:10px;color:var(--tl);margin-top:4px}
svg.arrows{position:absolute;top:0;left:0;pointer-events:none}
/* v4 additions */
.ind-list{margin-top:6px}.ind-item{font-size:12px;color:var(--tm);padding:3px 0 3px 14px;position:relative;line-height:1.5}.ind-item::before{content:'';position:absolute;left:0;top:10px;width:5px;height:5px;border-radius:50%;background:var(--bd)}
.dp-add{font-size:11px;color:var(--b600);cursor:pointer;padding:6px 0;display:inline-flex;align-items:center;gap:4px;border:none;background:none;font-family:var(--fn)}.dp-add:hover{color:var(--b800);text-decoration:underline}
.dp-rm{font-size:9px;color:var(--tl);cursor:pointer;border:none;background:none;padding:2px 4px;border-radius:3px;float:right;opacity:.4;font-family:var(--fn)}.dp-rm:hover{opacity:1;color:var(--lo);background:var(--r50)}
.dp-biz-item,.dp-sol-item{position:relative;padding-right:24px}
.dp-act-bar{margin-top:16px;padding-top:16px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px}

<body>
<div id="bar"><div><h1>Spotify — Root Map</h1><div class="sub">Inferred product decision logic</div></div><div class="sep"></div><div class="leg"><div class="li"><svg width="9" height="9"><circle cx="4.5" cy="4.5" r="3.5" fill="none" stroke="var(--r200)" stroke-width="1"/></svg>Need</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--b50)" stroke="var(--b400)" stroke-width="1.5"/></svg>Outcome</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--a50)" stroke="var(--a200)" stroke-width="1"/></svg>Business</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--t50)" stroke="var(--t200)" stroke-width="1"/></svg>Solution</div><div class="sep" style="height:14px"></div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--hi)"/></svg>High</div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--mi)"/></svg>Med</div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--lo)"/></svg>Low</div></div><div class="zc"><button onclick="zi()">+</button><button onclick="zo()">−</button><button onclick="rv()">⟲</button></div></div>
<div id="cc"><div id="cv"></div></div>
<div id="dp"><button class="xb" onclick="hp()">✕</button><div class="dp-i" id="dc"></div></div>
<script>
/* ============================================================
   LAYOUT ENGINE v4.0
   Zone-based positioning, rendering, arrows, detail panel
   Supports dynamic rebuild, sub-features, add/remove
   ============================================================ */
const NW=230,NG=35,BASE_RY=[50,620,1040];
const CC={high:'var(--hi)',medium:'var(--mi)',low:'var(--lo)'};
const LC={high:'var(--hi)',medium:'var(--mi)'};
const dC={diff:'dd',ts:'dts',bg:'dbg',unc:'du',beh:'dbh'};
const dL={diff:'differentiated',ts:'table stakes',bg:'battleground',unc:'uncontested',beh:'behind'};

/* ============================================================
   ===DATA=== REPLACE EVERYTHING BELOW THIS LINE PER PRODUCT
   ============================================================ */

let catCh = {
  'c-discover': ['f-algo','f-mood','f-deep'],
  'c-access':   ['f-connect','f-offline','f-quality'],
  'c-library':  ['f-playlists','f-search'],
  'c-social':   ['f-share','f-together'],
};

let catOrd = ['c-discover','c-access','c-library','c-social'];

const O = [
  {id:'root', root:true, evs:true, conf:'high',
    label:'Always have the perfect thing to listen to',
    sub:'Music, podcasts, and audio that fits your life — effortlessly discovered, instantly available, deeply personal',
    need:'Finding and enjoying audio content shouldn\'t require effort, compromise, or friction',
    needSev:3,
    biz:['Subscription revenue growth','Ad-supported tier monetization','Creator platform ecosystem value'],
    bizIndicators:['Premium subscriber count','ARPU (average revenue per user)','Ad revenue per MAU'],
    sol:[{name:'Spotify',tech:'Streaming platform · 100M+ tracks · 6M+ podcasts · AI-powered personalization · freemium model',eff:'strong'}],
    indicators:['Monthly active users','Average listening time per day','Subscriber-to-free ratio'],
    detail:{confReason:'Spotify is the global market leader in audio streaming with 675M+ MAU and 250M+ subscribers.<sup class="fn" title="Source">1</sup> The root outcome is validated by two decades of listener behavior data.',
      sources:['1. Spotify Q1 2025 earnings report'],
      belief:'Audio is becoming the dominant ambient media — people listen while doing other things. The platform that removes all friction from "what should I listen to right now?" wins.',
      competitors:[{n:'Apple Music',d:'Strong hardware integration, spatial audio, but weaker discovery'},{n:'YouTube Music',d:'Massive catalog via YouTube, but messy UX'},{n:'Amazon Music',d:'Bundled with Prime, low engagement'},{n:'Tidal',d:'Niche audiophile positioning'}],
      notes:'Root confidence is high because the market has validated audio streaming as a category. The question isn\'t whether people want this — it\'s how to maintain differentiation as competitors converge.'}},

  {id:'c-discover', evs:true, star:true, diff:'diff', conf:'high',
    label:'Discover what I\'ll love next',
    sub:'Reliably surface music and podcasts you didn\'t know you\'d enjoy — before you have to search',
    need:'I\'ve listened to everything I know and I\'m stuck — I want something new that actually fits me',
    needSev:3,
    biz:['Reduced churn through discovery habit','Artist development pipeline creates supplier leverage'],
    bizIndicators:['Discovery-driven listening as % of total streams','Churn rate for heavy discovery users vs. non-users'],
    sol:[{name:'Personalization engine',tech:'Collaborative filtering · content-based analysis · reinforcement learning · 1B+ daily personalization events',eff:'strong'}],
    indicators:['% of streams from algorithmic recommendations','Save rate on Discover Weekly tracks','Discovery-to-library conversion rate'],
    detail:{confReason:'Discovery is Spotify\'s most defensible moat. Discover Weekly alone reaches 100M+ listeners weekly.<sup class="fn" title="Source">1</sup> No competitor matches the depth of behavioral data powering recommendations.',
      sources:['1. Spotify investor presentation, personalization metrics'],
      belief:'Discovery is the reason people stay on Spotify even when competitors offer the same catalog. The algorithm IS the product for power users.',
      competitors:[{n:'Apple Music',d:'Human-curated playlists are strong but algorithmic discovery lags significantly'},{n:'YouTube Music',d:'Leverages video watch history — different signal, sometimes better for niche genres'}],
      notes:'This is the star differentiator — where Spotify distinctively wins. The personalization engine compounds: more data → better recommendations → more listening → more data.'}},

  {id:'c-access', evs:true, diff:'ts', conf:'high',
    label:'Listen anywhere, any way',
    sub:'Seamless playback across every device, connection, and context in your life',
    need:'Listening gets interrupted by device switches, poor connectivity, and interface friction',
    needSev:2,
    biz:['Multi-device engagement increases switching costs','Hardware partnership revenue (Spotify Connect ecosystem)'],
    bizIndicators:['Average devices per user','Cross-device session continuation rate'],
    sol:[{name:'Cross-platform client suite',tech:'Native apps (iOS/Android/desktop/web/TV/car/wearable) · Spotify Connect protocol · offline sync engine',eff:'strong'}],
    indicators:['Session continuation rate across devices','Offline listening hours','App stability / crash-free rate'],
    detail:{confReason:'Table stakes that Spotify executes well. Spotify Connect is a genuine differentiator within this category — seamless handoff between 2,000+ device types.',
      sources:['1. Spotify Connect partner ecosystem data'],
      belief:'Access is hygiene — you lose customers if it\'s broken, but you don\'t win them here. Spotify Connect is the exception: it\'s a genuinely delightful feature that competitors struggle to match.',
      competitors:[{n:'Apple Music',d:'Excellent within Apple ecosystem, poor outside it'},{n:'YouTube Music',d:'Web-native but weaker native apps'}],
      notes:'Confidence is high because this is well-executed and validated. Not a differentiator overall — the category is table stakes — but Spotify Connect within it is.'}},

  {id:'c-library', evs:true, diff:'ts', conf:'medium',
    label:'Build my perfect collection',
    sub:'Curate, organize, and instantly retrieve a personal audio library that reflects who you are',
    need:'My library is a mess — I can\'t find what I want when I want it',
    needSev:2,
    biz:['Library investment creates high switching costs'],
    bizIndicators:['Average playlists per user','Library size correlation with retention'],
    indicators:['Playlist creation rate','Search success rate (query → play)'],
    detail:{confReason:'Medium confidence — library management is table stakes but Spotify\'s tools haven\'t evolved much. Folder support is still clunky. Apple Music does this slightly better for power users.',
      sources:['1. User feedback forums, library management complaints'],
      belief:'Library features are underinvested relative to their retention impact. Every playlist a user creates is a reason not to switch.',
      competitors:[{n:'Apple Music',d:'Better library management, smart playlists, folder organization'},{n:'YouTube Music',d:'Weak library tools'}],
      notes:'Medium confidence because Spotify has stagnated here while competitors improved. Still EVS — can\'t compete without it.'}},

  {id:'c-social', evs:false, diff:'bg', conf:'medium',
    label:'Connect through what I listen to',
    sub:'Share discoveries, listen together, and bond over music with the people in your life',
    need:'Listening is often isolating — I want to share and experience music with others',
    needSev:1,
    biz:['Social features drive organic user acquisition','Collaborative playlists increase group retention'],
    bizIndicators:['Viral coefficient from sharing features','Spotify Wrapped social impressions'],
    indicators:['Share rate per user per month','Collaborative playlist participation rate'],
    detail:{confReason:'Battleground — social music is valuable but Spotify hasn\'t cracked it as a core daily behavior. Wrapped is a massive cultural moment but it\'s annual, not habitual.',
      sources:['1. Spotify Wrapped 2024 generated 200M+ social shares'],
      belief:'Social is a growth lever, not a retention driver. Wrapped proves the concept but daily social listening hasn\'t become habitual yet.',
      competitors:[{n:'Apple Music',d:'SharePlay for synced listening, but low adoption'},{n:'YouTube Music',d:'Benefits from YouTube\'s massive social sharing infrastructure'}],
      notes:'Non-EVS — Spotify could survive without social features, but they\'re a growth multiplier. Medium confidence because the right social model hasn\'t been found yet.'}},
];

const F = [
  // === DISCOVER ===
  {id:'f-algo', parent:'c-discover', idx:0, evs:true, star:true, diff:'diff', conf:'high',
    label:'Surface music I didn\'t know I\'d love',
    sub:'Algorithmically generated playlists and recommendations that feel like they were made by a friend who knows your taste',
    need:'I\'m tired of the same songs — I want to be surprised by something that actually fits me',
    needSev:3,
    sol:[{name:'Discover Weekly + Release Radar + Daily Mix',tech:'Collaborative filtering · audio analysis (Cortex) · NLP on podcasts · 1T+ daily events',eff:'strong'}],
    indicators:['Discover Weekly save rate','% of monthly listening from algo recommendations'],
    detail:{confReason:'This is Spotify\'s crown jewel. Discover Weekly has a 40%+ open rate — extraordinary for a weekly push.<sup class="fn" title="Source">1</sup>',
      sources:['1. Spotify internal metrics shared at investor day'],
      belief:'The recommendation engine is the single most defensible asset Spotify owns. It compounds with scale.',
      competitors:[{n:'Apple Music',d:'Relies more on human curation — high quality but doesn\'t scale or personalize as deeply'}],
      notes:'Star differentiator + EVS. This is why people choose Spotify AND why they can\'t leave.'}},

  {id:'f-mood', parent:'c-discover', idx:1, evs:true, diff:'diff', conf:'high',

function computeLayout(){
  zones={};allN=[];edges=[];RY=[...BASE_RY];
  // Detect sub-features (features whose parent is a feature, not a category)
  const subCh={};
  F.forEach(f=>{if(f.parent && !catCh[f.parent]){subCh[f.parent]=subCh[f.parent]||[];if(!subCh[f.parent].includes(f.id))subCh[f.parent].push(f.id);}});
  if(Object.keys(subCh).length>0)RY.push(RY[2]+420);

  // Compute zones
  let xC=40;
  catOrd.forEach(c=>{const n=(catCh[c]||[]).length;const zw=Math.max(NW+12,n*(NW+NG)-NG+12);zones[c]={x:xC,w:zw,cx:xC+zw/2,ch:catCh[c]||[]};xC+=zw+NG+15;});
  TW=xC+40;

  // Position root
  const fZ=zones[catOrd[0]],lZ=zones[catOrd[catOrd.length-1]];
  const mid=(fZ.x+lZ.x+lZ.w)/2;
  O[0].x=mid-140;O[0].y=RY[0];O[0].w=280;

  // Position categories
  O.forEach(o=>{if(o.root)return;if(zones[o.id]){o.x=zones[o.id].cx-NW/2;o.y=RY[1];o.w=NW;}});

  // Position features
  F.forEach(f=>{const z=zones[f.parent];if(!z)return;// skip sub-features
    const ch=z.ch;const n=ch.length;const tw=n*NW+(n-1)*NG;const sx=z.x+(z.w-tw)/2;
    const idx=ch.indexOf(f.id);if(idx<0)return;f.x=sx+idx*(NW+NG);f.y=RY[2];f.w=NW;});

  // Position sub-features
  F.forEach(f=>{if(!f.parent||catCh[f.parent])return;
    const pn=[...O,...F].find(n=>n.id===f.parent);if(!pn||!pn.x)return;
    const sibs=subCh[f.parent]||[];const n=sibs.length;const tw=n*NW+(n-1)*NG;
    const sx=pn.x+(pn.w||NW)/2-tw/2;const idx=sibs.indexOf(f.id);
    f.x=sx+idx*(NW+NG);f.y=RY[3]||RY[2]+420;f.w=NW;});

  // Build node + edge lists
  allN=[...O,...F];
  edges=[];
  catOrd.forEach(c=>{edges.push([c,'root']);(catCh[c]||[]).forEach(fid=>{edges.push([fid,c]);const sf=subCh[fid];if(sf)sf.forEach(sfid=>edges.push([sfid,fid]));});});

  // Bounding box
  bbL=Infinity;bbT=Infinity;bbR=-Infinity;bbB=-Infinity;
  allN.forEach(n=>{if(n.x==null)return;bbL=Math.min(bbL,n.x);bbT=Math.min(bbT,n.y);bbR=Math.max(bbR,n.x+(n.w||NW));bbB=Math.max(bbB,n.y+400);});
  mapW=bbR-bbL;mapH=bbB-bbT;
}

    g.innerHTML=h;g.onclick=e=>{e.stopPropagation();sp(o)};cv.appendChild(g);nodeEls[o.id]={el:g,data:o};
  });

  } else if(catCh[parentId]){
    // Parent is a category — add as feature
    F.push({id:newId,parent:parentId,idx:(catCh[parentId]||[]).length,evs:false,conf:'low',label:label,sub:'? Needs articulation',need:'? What customer problem does this address?',needSev:1,detail:{notes:'PLACEHOLDER — added via map. Needs team input.'}});
    catCh[parentId].push(newId);
  } else {
    // Parent is a feature — add as sub-feature
    F.push({id:newId,parent:parentId,idx:0,evs:false,conf:'low',label:label,sub:'? Needs articulation',need:'? What customer problem does this address?',needSev:1,detail:{notes:'PLACEHOLDER — added as sub-feature via map. Needs team input.'}});
  }
  rebuild();
}

// === REBUILD ===
function rebuild(){
  computeLayout();renderAll();
  setTimeout(()=>{drawE();if(selectedNodeId){const n=findNode(selectedNodeId);if(n)sp(n);}},100);
}

// === PAN + ZOOM ===
function fitView(){
  const vw=cont.clientWidth,vh=cont.clientHeight;
  const sx=(vw-PAD*2)/mapW,sy=(vh-PAD*2)/mapH;
  s=Math.min(sx,sy,1.5);px=(vw-mapW*s)/2-bbL*s;py=(vh-mapH*s)/2-bbT*s;
}
function ap(){cv.style.transform='translate('+px+'px,'+py+'px) scale('+s+')'}

let dr=false,dsx,dsy;
cont.addEventListener('mousedown',e=>{if(e.target.closest('.ng'))return;dr=true;dsx=e.clientX-px;dsy=e.clientY-py});
window.addEventListener('mousemove',e=>{if(!dr)return;px=e.clientX-dsx;py=e.clientY-dsy;ap()});
window.addEventListener('mouseup',()=>dr=false);
cont.addEventListener('wheel',e=>{e.preventDefault();const olds=s;s=Math.max(.05,Math.min(2,s*(e.deltaY>0?.98:1.02)));const r=s/olds;const rect=cont.getBoundingClientRect();const cx=e.clientX-rect.left,cy=e.clientY-rect.top;px=cx-r*(cx-px);py=cy-r*(cy-py);ap()},{passive:false});
function zi(){const olds=s;s=Math.min(2,s*1.08);const r=s/olds;const vw=cont.clientWidth/2,vh=cont.clientHeight/2;px=vw-r*(vw-px);py=vh-r*(vh-py);ap()}
function zo(){const olds=s;s=Math.max(.05,s*.92);const r=s/olds;const vw=cont.clientWidth/2,vh=cont.clientHeight/2;px=vw-r*(vw-px);py=vh-r*(vh-py);ap()}
function rv(){fitView();ap()}
cv.addEventListener('click',e=>{if(!e.target.closest('.ng'))hp()});
window.addEventListener('resize',()=>{fitView();ap();setTimeout(drawE,100)});

// Touch support for mobile pan
let touchStart=null;
cont.addEventListener('touchstart',e=>{if(e.target.closest('.ng'))return;if(e.touches.length===1){touchStart={x:e.touches[0].clientX-px,y:e.touches[0].clientY-py};}},{passive:true});
cont.addEventListener('touchmove',e=>{if(!touchStart||e.touches.length!==1)return;e.preventDefault();px=e.touches[0].clientX-touchStart.x;py=e.touches[0].clientY-touchStart.y;ap()},{passive:false});
cont.addEventListener('touchend',()=>{touchStart=null});

// === INITIAL BUILD ===
computeLayout();renderAll();fitView();ap();
setTimeout(drawE,500);
</script>
</body>
