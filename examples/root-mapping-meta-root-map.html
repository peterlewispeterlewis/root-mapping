<!--
  ROOT MAP HTML TEMPLATE v2.0
  Visual specification updated from v1.0 (AirPods Pro 3 v10 iteration).
  
  CHANGES FROM v1.0:
  - RY spacing: [50, 530, 1020] — more breathing room between root→categories, tighter categories→features
  - Need cards: solid border (not dashed)
  - Detail panel: white background
  - Zoom: much gentler scroll (±2% per tick), buttons ±8%
  - Default zoom: .24, gentler initial view
  - Expansion opportunity support: optional purple treatment for suggested/speculative nodes
  
  TO USE: Replace the DATA SECTION below (lines marked ===DATA===) with product-specific content.
  Do NOT modify CSS, layout engine, rendering logic, or detail panel structure.
  
  DATA STRUCTURES:
  
  Categories array O[] — each category outcome:
  {
    id: 'c-xxx',                    // unique id prefixed c-
    evs: true|false,                // essential value scope
    diff: 'diff'|'ts'|'bg'|'unc'|'beh',  // competitive position (optional)
    conf: 'high'|'medium'|'low',    // outcome confidence
    label: 'Outcome statement',     // the customer benefit — concrete, testable, direct
    sub: 'Supporting detail',       // clarifying subtitle
    need: 'Customer problem',       // the pain point this addresses
    needSev: 3|2|1,                 // need severity: 3=severe, 2=moderate, 1=minor
    biz: ['Business outcome 1'],    // business outcomes (optional array)
    sol: [{                         // solutions (optional array)
      name: 'Solution name',
      tech: 'Technical requirements',
      eff: 'strong'|'adequate'|'unproven'
    }],
    detail: {                       // click-through detail (optional but recommended)
      confReason: 'Why this confidence...<sup class="fn" title="Source">1</sup>',
      sources: ['1. Source description'],
      belief: 'Team belief statement',
      competitors: [{n:'Name', d:'Description'}],
      notes: 'Strategic notes'
    }
  }
  
  Features array F[] — each feature outcome:
  {
    id: 'f-xxx',                    // unique id prefixed f-
    parent: 'c-xxx',                // parent category id
    idx: 0,                         // index within parent (0-based, for positioning)
    ... same fields as categories
  }
  
  EXPANSION OPPORTUNITY NODES (optional — add ONLY when user requests):
  
  Expansion nodes use the same schema as regular nodes PLUS:
  {
    id: 'e-xxx',                    // unique id prefixed e-
    isExp: true,                    // marks as expansion opportunity
    leverage: 'high'|'medium',      // strategic leverage level
    ... same fields as categories/features
  }
  
  Category-level expansions: add to catOrd and catCh as peer categories
  Feature-level expansions: add to F[] with parent and idx, positioned rightmost in their zone
  
  POSITIONING RULES FOR EXPANSION NODES:
  - Expansion nodes live at the SAME tier as the thing they're comparable to
  - A new outcome branch (peer to existing categories) → category tier, rightmost in catOrd near its related branch
  - A new feature within an existing branch → feature tier, rightmost idx in parent's children
  - NEVER put expansions in a separate tier — they must be at the correct conceptual altitude
  
  Root object — first item in O[]:
  { id:'root', root:true, ... same fields plus root:true flag }
  
  IMPORTANT:
  - catCh maps category ids to their feature child ids (for zone sizing)
  - catOrd is the left-to-right order of categories
  - Root is centered above the most important/widest category
  - The root's solution should be the product name itself
  - Attach solutions to categories only when a category-level feature suite exists
  - Only attach solutions to features when specific implementations exist
  - Use placeholders: { label:'? Needs articulation', conf:'low', need:'?', needSev:1 }
-->

<div id="bar"><div><h1>Root Mapping — Root Map</h1><div class="sub">Inferred decision logic + expansion opportunities</div></div><div class="sep"></div><div class="leg"><div class="li"><svg width="9" height="9"><circle cx="4.5" cy="4.5" r="3.5" fill="none" stroke="var(--r200)" stroke-width="1"/></svg>Need</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--b50)" stroke="var(--b400)" stroke-width="1.5"/></svg>Outcome</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--a50)" stroke="var(--a200)" stroke-width="1"/></svg>Business</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--t50)" stroke="var(--t200)" stroke-width="1"/></svg>Solution</div><div class="li"><svg width="9" height="9"><rect x=".5" y=".5" width="8" height="8" rx="2" fill="var(--e50)" stroke="var(--e400)" stroke-width="1" stroke-dasharray="2 1"/></svg>Opportunity</div><div class="sep" style="height:14px"></div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--hi)"/></svg>High</div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--mi)"/></svg>Med</div><div class="li"><svg width="7" height="7"><circle cx="3.5" cy="3.5" r="3" fill="var(--lo)"/></svg>Low</div></div><div class="zc"><button onclick="zi()">+</button><button onclick="zo()">−</button><button onclick="rv()">⟲</button></div></div>

<script>
/* ============================================================
   LAYOUT ENGINE v2.0 — DO NOT MODIFY
   Zone-based positioning, rendering, arrows, detail panel
   ============================================================ */
const NW=230,NG=35,RY=[50,620,1040];
const CC={high:'var(--hi)',medium:'var(--mi)',low:'var(--lo)'};
const LC={high:'var(--hi)',medium:'var(--mi)'};
const dC={diff:'dd',ts:'dts',bg:'dbg',unc:'du',beh:'dbh'};
const dL={diff:'differentiated',ts:'table stakes',bg:'battleground',unc:'uncontested',beh:'behind'};

/* ============================================================
   ===DATA=== REPLACE EVERYTHING BELOW THIS LINE PER PRODUCT
   ============================================================ */

const catCh = {
  'c-clarity': ['f-root-out', 'f-language'],
  'c-align': ['f-visible', 'f-iterate'],
  'c-scope': ['f-evs-test', 'f-defer'],
  'c-gaps': ['f-missing', 'f-compete'],
  'c-pitch': ['f-narrative'],
  'e-career': ['e-role'],
};

// Category display order: EVS by shipping sequence (foundational → dependent), then non-EVS, then expansion
const catOrd = ['c-clarity', 'c-align', 'c-scope', 'c-gaps', 'c-pitch', 'e-career'];

const O = [
  // ROOT
  {id:'root', root:true, evs:true, conf:'high',
    label:'Own the logic behind what I build — and prove it',
    sub:'Strategic clarity that\'s visible, debatable, and actionable — not trapped in anyone\'s head',
    need:'Product decisions feel political, arbitrary, or invisible — even to the people making them',
    needSev:3,
    biz:['Strategic influence — become the person who clarifies what matters','Faster alignment — stop re-arguing priorities every sprint','Career differentiation — demonstrate strategy thinking, not just execution','Shipping confidence — cut scope without anxiety because the logic is visible'],
    sol:[{name:'Root Mapping',tech:'Conversational framework + visual artifact · outcomes hierarchy · competitive context · EVS logic',eff:'strong'}],
    detail:{confReason:'Product teams consistently struggle to articulate why they\'re building what they\'re building.<sup class="fn" title="Marty Cagan, INSPIRED">1</sup> Most frameworks address discovery or delivery but not the persistent decision logic between them.<sup class="fn" title="Teresa Torres, Continuous Discovery Habits">2</sup> Root Mapping fills this gap with a visual artifact that makes strategy debatable.',
      sources:['Cagan, Marty: INSPIRED — product teams lack shared strategic context','Torres, Teresa: Continuous Discovery Habits — opportunity space ≠ decision logic','Patton, Jeff: User Story Mapping — delivery-focused, not outcome-focused','Adzic, Gojko: Impact Mapping — delivery planning, not strategic visualization'],
      belief:'If the decision logic behind a product is visible, the team makes better decisions faster — and the person who makes it visible gains outsized influence.',
      competitors:[{n:'JTBD (Christensen)',d:'Excellent for discovery. No visual hierarchy, no EVS, no competitive context, no living artifact.'},{n:'Opportunity Solution Trees',d:'Closest. But opportunities ≠ outcomes, no biz outcomes, no competitive position, no EVS concept.'},{n:'Lean Canvas',d:'Business-model scoped. Not product decision logic. Static one-pager.'},{n:'OKRs',d:'Measurement-focused. Key Results ≠ outcome hierarchy. No "why" chain.'},{n:'Story Mapping',d:'Delivery sequence. Features, not outcomes. No strategic layer.'},{n:'Wardley Mapping',d:'Value chain positioning. Doesn\'t capture customer outcomes or team beliefs.'}],
      notes:'Root Mapping is differentiated by combining: outcome hierarchy + needs + business outcomes + competitive context + EVS + confidence indicators + visual artifact — in a single living document. No other framework does all of these together.'}},

  // CATEGORIES
  {id:'c-clarity', evs:true, diff:'diff', conf:'high',
    label:'Articulate exactly what must be true for users',
    sub:'Define outcomes — the thing that will be true in their lives if the product succeeds',
    need:'Teams say "we\'re building X" but can\'t say what changes in customers\' lives — features masquerade as strategy',
    needSev:3,
    sol:[{name:'Outcome laddering conversation',tech:'Structured questioning: moving UP (so that they can ___) and DOWN (what must be true first?)',eff:'strong'}],
    detail:{confReason:'This is the core value proposition of Root Mapping and the origin of the framework.<sup class="fn" title="Lewis, Peter: Value Mapping (2020)">1</sup> The outcome language discipline ("the thing that will be true for them") is the most distinctive and immediately useful concept.',
      sources:['Lewis, Peter: Value Mapping — Medium, 2020','Lewis, Peter: IxDA talk on Outcome Laddering'],
      belief:'If you can\'t state what will be true for customers, you don\'t have a strategy — you have a feature list.',
      competitors:[{n:'JTBD',d:'Jobs are close to outcomes but framed as tasks, not states of being. "Help me ___" vs "Now they can ___"'},{n:'OKRs',d:'Key Results are metrics, not customer realities. "Increase retention by 10%" ≠ "They trust us with their data"'},{n:'Lean Canvas',d:'Value proposition box exists but stays vague — no hierarchy or enabling logic'}],
      notes:'The "Nobody Cares About Your Product" framing is the hook — provocative enough to break through, true enough to stick.'}},

  {id:'c-align', evs:true, diff:'diff', conf:'high',
    label:'Get the whole team arguing from the same map',
    sub:'A shared, visual decision structure that everyone can point at, challenge, and update',
    need:'PM, design, eng, and leadership each have a different mental model of what matters — misalignment surfaces as feature debates',
    needSev:3,
    sol:[{name:'Visual root map artifact',tech:'Interactive HTML map · zoomable · clickable detail panels · editable notes · shareable file',eff:'strong'}],
    detail:{confReason:'Alignment is the #1 challenge cited by product leaders.<sup class="fn" title="Product Board State of Product 2024">1</sup> Existing alignment tools (strategy docs, OKR decks) are static and quickly become stale. A living visual artifact that can be iterated in conversation is a step-change.',
      sources:['Product Board: State of Product Management report, 2024','Cagan, Marty: EMPOWERED — aligned autonomy requires shared context'],
      belief:'A map everyone can see and challenge is more powerful than a strategy deck that lives in someone\'s Google Drive.',
      competitors:[{n:'Miro/FigJam boards',d:'General-purpose canvas. No structure, no outcome hierarchy, no indicators.'},{n:'Strategy docs',d:'Static. Quickly stale. No visual hierarchy. Hard to challenge specific assumptions.'},{n:'OKR tools (Lattice, etc.)',d:'Track metrics, don\'t visualize decision logic.'}],
      notes:'The iteration loop (conversation → map → review → conversation) is the real differentiator vs static frameworks.'}},

  {id:'c-scope', evs:true, diff:'diff', conf:'high',
    label:'Cut scope without losing the plot',
    sub:'Know what\'s essential vs. nice-to-have — with logic, not gut feel',
    need:'"MVP" conversations are gut-feel — no shared criteria for what\'s essential vs deferrable',
    needSev:3,
    sol:[{name:'Essential Value Scope (EVS)',tech:'Binary test: remove outcome → does root still work? Solid vs dashed visual treatment',eff:'strong'}],
    detail:{confReason:'The EVS concept is unique to Root Mapping<sup class="fn" title="Lewis, Peter: Value Mapping">1</sup> and directly addresses the most painful moment in product development: cutting scope. Most frameworks leave this as an exercise for the reader.',
